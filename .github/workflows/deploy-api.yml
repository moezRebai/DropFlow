name: Deploy API to Fly.io

on:
  push:
    branches: [main]
    paths:
      - 'src/DropFlow.Api/**'
      - 'src/DropFlow.Application/**'
      - 'src/DropFlow.Domain/**'
      - 'src/DropFlow.Infrastructure/**'
      - 'src/DropFlow.Shared/**'
      - 'Dockerfile.api'
      - 'fly.toml'

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --app dropflow-api
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
